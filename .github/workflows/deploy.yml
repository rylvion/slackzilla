name: Deploy Slackzilla

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: slackzilla-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate manifest
        run: npm run generate-manifest

      - name: Validate generated manifest
        run: npm run validate-manifest

      - name: Rotate Slack manifest token
        id: rotate-token
        env:
          SLACK_REFRESH_TOKEN: ${{ secrets.SLACK_REFRESH_TOKEN }}
          GH_SECRET_PAT: ${{ secrets.GH_SECRET_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/rotateManifestToken.js

      - name: Sync manifest to Slack
        env:
          SLACK_MANIFEST_TOKEN: ${{ steps.rotate-token.outputs.slack_manifest_token }}
          SLACK_APP_ID: ${{ secrets.SLACK_APP_ID }}
        run: |
          set -euo pipefail

          if [ -z "${SLACK_MANIFEST_TOKEN:-}" ] || [ -z "${SLACK_APP_ID:-}" ]; then
            echo "Missing SLACK_MANIFEST_TOKEN or SLACK_APP_ID"
            exit 1
          fi

          request_body=$(node -e "
            const fs = require('fs')

            const manifest = fs.readFileSync('manifest.json', 'utf8')

            process.stdout.write(JSON.stringify({
              token: process.env.SLACK_MANIFEST_TOKEN,
              app_id: process.env.SLACK_APP_ID,
              manifest
            }))
          ")

          response=$(curl -sS -X POST https://slack.com/api/apps.manifest.update \
            -H "Content-Type: application/json; charset=utf-8" \
            -H "Authorization: Bearer ${SLACK_MANIFEST_TOKEN}" \
            --data "$(node -e "
              const fs = require('fs')

              const manifest = fs.readFileSync('manifest.json', 'utf8')

              process.stdout.write(JSON.stringify({
                app_id: process.env.SLACK_APP_ID,
                manifest
              }))
            ")")

          echo "$response"

          ok=$(node -e "
            const input = process.argv[1]
            const parsed = JSON.parse(input)

            process.stdout.write(String(parsed.ok))
          " "$response")

          if [ "$ok" != "true" ]; then
            echo "Slack manifest update failed"
            exit 1
          fi

      - name: Send deployment webhook
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail

          if [ -z "${WEBHOOK_URL:-}" ] || [ -z "${WEBHOOK_SECRET:-}" ]; then
            echo "Missing WEBHOOK_URL or WEBHOOK_SECRET, please set them in the repository secrets."
            exit 1
          fi

          payload=$(python -c 'import json, os; print(json.dumps({"ref": os.environ["GITHUB_REF"], "after": os.environ["GITHUB_SHA"], "repository": {"full_name": os.environ["GITHUB_REPOSITORY"], "default_branch": "main"}, "sender": {"login": "github-actions"}}))')

          signature="sha256=$(printf '%s' "$payload" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -hex | awk '{print $2}')"

          curl -fsS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-GitHub-Delivery: ${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            -H "X-Hub-Signature-256: $signature" \
            --data "$payload"